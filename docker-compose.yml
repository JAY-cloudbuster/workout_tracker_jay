version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: gymtracker_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=gymtracker_pro

  redis:
    image: redis:7.0-alpine
    container_name: gymtracker_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gymtracker_server
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/gymtracker_pro
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://localhost:5173
      - JWT_ACCESS_SECRET=docker_access_secret_key_dev_2024
      - JWT_REFRESH_SECRET=docker_refresh_secret_key_dev_2024
      - JWT_ACCESS_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - COOKIE_SECRET=docker_cookie_secret_dev_2024
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: gymtracker_client
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:5000/api/v1
    depends_on:
      - server
    volumes:
      - ./client:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  mongodb_data:
  redis_data:
